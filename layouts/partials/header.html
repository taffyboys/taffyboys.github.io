<header class="site-header">
    <div class="header-inner">
        <a href="{{ "/" | relURL }}" class="site-title">{{ .Site.Title }}</a>
        <nav class="site-nav" aria-label="主导航">
            <a href="{{ "/" | relURL }}"{{ if .IsHome }} class="is-active"{{ end }}>首页</a>
            <a href="{{ "about/" | relURL }}"{{ if eq .RelPermalink ("about/" | relURL) }} class="is-active"{{ end }}>说明</a>
            <a href="{{ "posts/" | relURL }}"{{ if eq .Section "posts" }} class="is-active"{{ end }}>文章</a>
            <a href="{{ "tags/" | relURL }}">标签</a>
            <a href="{{ "categories/" | relURL }}">分类</a>
        </nav>
    </div>
</header>
